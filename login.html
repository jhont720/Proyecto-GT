<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-login">
    <div class="container card-login">
        <h2>🔐 Ingreso al Sistema</h2>
        <div class="form-group-login">
            <input type="text" id="usuario" placeholder="Escribí tu usuario">
            <input type="password" id="clave" placeholder="Escribí tu contraseña">
            <button class="btn-guardar" onclick="iniciarSesion()">Entrar</button>
        </div>
        <p class="link-texto">
            ¿No tenés cuenta? <a href="registro.html" class="link-accion">Registrate acá</a>
        </p>
    </div>
    <script src="login.js"></script>
</body>
</html>
