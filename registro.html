<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-login">
    <div class="container card-login">
        <h2>👤 Crear Cuenta Nueva</h2>
        <div class="form-group-login">
            <input type="text" id="nuevo-usuario" placeholder="Inventá un usuario">
            <input type="password" id="nueva-clave" placeholder="Inventá una contraseña">
            <button class="btn-guardar" onclick="registrarUsuario()">Registrarme</button>
        </div>
        <p class="link-texto">
            ¿Ya tenés cuenta? <a href="login.html" class="link-accion">Volver al ingreso</a>
        </p>
    </div>
    <script src="login.js"></script>
</body>
</html>
