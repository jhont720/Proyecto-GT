<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión de Horas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Panel de Control de Tareas</h1>
        <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
    </nav>

    <div class="container card-formulario">
        <h2><span class="icono">📝</span> Cargar Nuevo Registro</h2>
        <div class="form-group">
            <input type="text" id="nombre" placeholder="Nombre del empleado">
            <input type="date" id="fecha" title="Fecha trabajada">
            <input type="text" id="proyecto" placeholder="Nombre del proyecto">
        </div>
        <div class="form-group">
            <input type="time" id="hora_inicio" title="Hora de inicio">
            <input type="time" id="hora_fin" title="Hora de fin">
            <input type="text" id="tarea" placeholder="Tarea realizada" class="input-largo">
        </div>
        <div class="form-group">
            <select id="tipo_horas">
                <option value="Normales">Horas Normales</option>
                <option value="Extras">Horas Extras</option>
            </select>
        </div>
        <button id="btn-guardar-principal" class="btn-guardar" onclick="guardarRegistro()">Guardar Registro</button>
    </div>

    <div class="container card-tabla">
        <h2><span class="icono">📊</span> Historial de Registros</h2>
        <div class="table-responsive">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Empleado</th>
                        <th>Fecha</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Proyecto</th>
                        <th>Tarea</th>
                        <th>Tipo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
